<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pleading-to-Proof — Evidence Coherence Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#070A10; --void2:#0A0E16; --panel:#0F151F; --panel2:#131B28; --line:#1B2536;
  --ink:#E7EDF6; --ink2:#92A1B6; --ink3:#56657E;
  --cyan:#3FD3CB; --brass:#C9A24B;
  --green:#46C68E; --red:#E2574A; --amber:#E7B45A; --gap:#6A788F; --orange:#E08A45;
  --disp:'Space Grotesk','Segoe UI',system-ui,sans-serif;
  --body:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;
  --mono:'JetBrains Mono','Consolas',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  background:
    radial-gradient(1200px 700px at 70% -10%, rgba(63,211,203,.06), transparent 60%),
    radial-gradient(900px 600px at 0% 110%, rgba(201,162,75,.05), transparent 55%),
    var(--void);
  color:var(--ink); font-family:var(--body); font-size:14px;
  display:flex; flex-direction:column; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
/* hairline grid backdrop */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:46px 46px; mask-image:radial-gradient(ellipse 80% 80% at 50% 40%,#000 30%,transparent 78%);
}
/* ---------------------------------------------------------------- command bar */
header{
  position:relative; z-index:3; display:flex; align-items:center; gap:24px;
  padding:14px 22px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(19,27,40,.72),rgba(15,21,31,.5)); backdrop-filter:blur(6px);
}
.brand{display:flex; align-items:center; gap:11px; min-width:max-content}
.glyph{width:30px;height:30px;border:1.5px solid var(--cyan);border-radius:7px;display:grid;place-items:center;
  color:var(--cyan); box-shadow:0 0 18px rgba(63,211,203,.25) inset, 0 0 14px rgba(63,211,203,.12)}
.glyph svg{width:17px;height:17px}
.brand .t1{font-family:var(--mono);font-size:10px;letter-spacing:.34em;color:var(--cyan);text-transform:uppercase}
.brand .t2{font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.01em;line-height:1.1}
.case{flex:1; min-width:0}
.case .name{font-family:var(--disp);font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.case .name em{font-style:normal;color:var(--ink3);font-weight:500;padding:0 6px}
.case .sub{font-family:var(--mono);font-size:10.5px;color:var(--ink3);letter-spacing:.06em;margin-top:2px}
/* mode toggle */
.modes{display:flex;background:var(--void2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px}
.modes button{
  font-family:var(--disp);font-weight:600;font-size:12.5px;letter-spacing:.01em;color:var(--ink2);
  background:transparent;border:0;border-radius:6px;padding:7px 14px;cursor:pointer;transition:.22s;white-space:nowrap}
.modes button .k{font-family:var(--mono);font-size:9px;letter-spacing:.18em;display:block;color:var(--ink3);margin-bottom:1px}
.modes button.on{background:linear-gradient(180deg,#16202f,#101824);color:var(--ink);box-shadow:0 0 0 1px var(--cyan) inset,0 6px 18px rgba(0,0,0,.4)}
.modes button.on .k{color:var(--cyan)}
.stats{display:flex;gap:8px;min-width:max-content}
.stat{border:1px solid var(--line);border-radius:8px;padding:6px 12px;background:rgba(10,14,22,.5);text-align:right}
.stat b{font-family:var(--disp);font-size:17px;font-weight:700;display:block;line-height:1}
.stat span{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3)}
.stat.alert b{color:var(--red)} .stat.cash b{color:var(--brass)}
/* ---------------------------------------------------------------- main */
main{position:relative;z-index:1;flex:1;display:flex;min-height:0}
#stage{flex:1;position:relative;min-width:0}
#net{width:100%;height:100%;display:block;cursor:grab}
#net.grabbing{cursor:grabbing}
.flow-label{position:absolute;top:12px;font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--ink3);pointer-events:none;z-index:2}
.thesis{position:absolute;left:18px;bottom:14px;max-width:430px;z-index:2;pointer-events:none}
.thesis .lead{font-family:var(--disp);font-weight:600;font-size:14px;line-height:1.35;color:var(--ink)}
.thesis .slogan{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--cyan);margin-top:7px}
.thesis .seeded{font-family:var(--mono);font-size:9.5px;color:var(--ink3);margin-top:6px;line-height:1.5}
/* svg elements */
.edge{fill:none;stroke-linecap:round;transition:opacity .35s}
.node{cursor:pointer}
.node circle{transition:opacity .35s,stroke-width .15s}
.node text{font-family:var(--mono);font-size:10px;fill:var(--ink2);pointer-events:none;
  paint-order:stroke;stroke:var(--void);stroke-width:3px;transition:opacity .35s}
.node.prop text{font-family:var(--disp);font-weight:700;font-size:12px;fill:var(--ink)}
.node.dim circle,.node.dim text,.edge.dim{opacity:.08}
.node.fade circle{opacity:.18} .node.fade text{opacity:0}
/* ---------------------------------------------------------------- inspector */
#inspector{width:360px;border-left:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--void2));
  display:flex;flex-direction:column;z-index:2}
.insp-head{padding:16px 18px 12px;border-bottom:1px solid var(--line)}
.insp-eyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--cyan)}
.insp-title{font-family:var(--disp);font-weight:600;font-size:16px;margin-top:6px;line-height:1.25}
.insp-body{padding:14px 18px;overflow-y:auto;flex:1}
.insp-body::-webkit-scrollbar{width:8px} .insp-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 12px}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding:4px 9px;border-radius:5px;
  border:1px solid var(--line);background:var(--void2);color:var(--ink2)}
.chip.v{border-left-width:3px}
.field{margin:13px 0}
.field .lab{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.field .val{font-size:13.5px;line-height:1.5;color:var(--ink)}
.quote{font-family:var(--body);font-size:13px;line-height:1.55;color:var(--ink);
  border-left:2px solid var(--cyan);padding:8px 0 8px 12px;background:linear-gradient(90deg,rgba(63,211,203,.05),transparent)}
.anchor{font-family:var(--mono);font-size:11px;color:var(--brass)}
.rel-item{border:1px solid var(--line);border-radius:7px;padding:9px 11px;margin-bottom:8px;background:var(--void2)}
.rel-item .r{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.rel-item .e{font-size:12px;color:var(--ink2);line-height:1.45;margin-top:4px}
.empty{color:var(--ink3);font-size:13px;line-height:1.6}
.empty b{color:var(--ink2);font-weight:600}
.amend{font-size:12.5px;line-height:1.5;color:var(--ink);border-left:2px solid var(--brass);padding-left:11px;margin:8px 0}
.pitch{font-family:var(--disp);font-weight:600;font-size:13px;line-height:1.45;color:var(--ink);border-left:2px solid var(--cyan);padding-left:11px;margin-bottom:14px}
details.scale{margin-top:18px;border-top:1px solid var(--line);padding-top:12px}
details.scale summary{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);cursor:pointer;list-style:none}
details.scale summary::-webkit-details-marker{display:none}
details.scale summary::before{content:"\25B8  ";color:var(--ink3)}
details.scale[open] summary::before{content:"\25BE  "}
details.scale .empty{margin-top:9px}
.story-li{font-size:12.5px;line-height:1.5;color:var(--ink2);margin:5px 0;padding-left:14px;position:relative}
.story-li::before{content:"·";position:absolute;left:2px;color:var(--cyan);font-weight:700}
/* ---------------------------------------------------------------- legend */
footer{position:relative;z-index:3;display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  padding:9px 22px;border-top:1px solid var(--line);background:rgba(10,14,22,.6);font-family:var(--mono);font-size:10px;color:var(--ink3)}
.leg{display:flex;align-items:center;gap:6px;letter-spacing:.04em}
.dot{width:10px;height:10px;border-radius:50%} .dot.sq{border-radius:2px}
.ln{width:18px;height:0;border-top:2px solid}
.sep{width:1px;height:14px;background:var(--line)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="12" r="2.4"/><circle cx="6" cy="18" r="2.4"/><path d="M8 7l8 4M8 17l8-5"/></svg></div>
    <div><div class="t1">Pleading-to-Proof</div><div class="t2">Coherence Console</div></div>
  </div>
  <div class="case">
    <div class="name" id="caseName"></div>
    <div class="sub" id="caseSub"></div>
  </div>
  <div class="modes" id="modes">
    <button data-mode="pleading" class="on"><span class="k">Paradigm A</span>Pleading Stress Test</button>
    <button data-mode="coherence"><span class="k">Paradigm B</span>Bundle Coherence</button>
  </div>
  <div class="stats" id="stats"></div>
</header>
<main>
  <div id="stage">
    <span class="flow-label" id="flowDoc"  style="left:13%">Provenance · documents</span>
    <span class="flow-label" id="flowClaim" style="left:46%">Reasoning · quote-grounded claims</span>
    <span class="flow-label" id="flowProp" style="left:79%">Litigation · pleaded propositions</span>
    <svg id="net"></svg>
    <div class="thesis">
      <div class="lead" id="thesisLead"></div>
      <div class="slogan">LLM local · solver global · lawyer in control</div>
      <div class="seeded" id="thesisSeeded"></div>
    </div>
  </div>
  <aside id="inspector">
    <div class="insp-head"><div class="insp-eyebrow" id="iEye">Inspector</div><div class="insp-title" id="iTitle">Select a node</div></div>
    <div class="insp-body" id="iBody"></div>
  </aside>
</main>
<footer id="legend"></footer>

<script>
const DATA = /*__DATA__*/;

/* ---------------------------------------------------------------- palette */
const C = {cyan:'#3FD3CB',brass:'#C9A24B',green:'#46C68E',red:'#E2574A',amber:'#E7B45A',gap:'#6A788F',
  orange:'#E08A45',ink2:'#92A1B6',line:'#2A3a52',doc:'#7C8AA3'};
const VCOL={SUPPORTED:C.green,CONTRADICTED:C.red,NOT_ADDRESSED:C.gap,UNVERIFIED:C.amber};
const RELCOL={contradicts:C.red,supersedes:C.orange,supports:C.green,caps:C.amber,
  qualifies:C.amber,legal_bar:C.amber,attacks:C.orange,asserts:C.cyan,belongs_to:C.gap,same_as:C.cyan};

function claimColor(n){
  if(n.source_type==='absence') return C.gap;
  if(n.polarity==='legal_overlay') return C.amber;
  return n.verdict==='accepted'?C.green:C.red;
}
function nodeColor(n){
  if(n.layer==='proposition') return VCOL[n.verdict]||C.amber;
  if(n.layer==='document') return C.doc;
  return claimColor(n);
}
function nodeR(n){ return n.layer==='proposition'?15:(n.layer==='document'?8:10); }

/* ---------------------------------------------------------------- model */
const svg=document.getElementById('net');
const SVGNS='http://www.w3.org/2000/svg';
let W=svg.clientWidth,H=svg.clientHeight;
const nodes=DATA.nodes.map(n=>({...n}));
const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
const edges=DATA.edges.map(e=>({...e,s:byId[e.source],t:byId[e.target]})).filter(e=>e.s&&e.t);
const LAYERX={document:0.15,claim:0.49,proposition:0.83};
const adj={}; nodes.forEach(n=>adj[n.id]=new Set());
edges.forEach(e=>{adj[e.source].add(e.target);adj[e.target].add(e.source);});

let mode='pleading';
const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

/* seed positions by layer column + vertical spread */
const layers={document:[],claim:[],proposition:[]};
nodes.forEach(n=>layers[n.layer].push(n));
for(const k in layers){
  const arr=layers[k];
  arr.forEach((n,i)=>{
    n.x=LAYERX[k]*W + (Math.random()-.5)*40;
    n.y=H*(0.14 + 0.72*(i+.5)/arr.length) + (Math.random()-.5)*30;
    n.vx=0; n.vy=0;
  });
}
// documents and propositions sit in ordered ledger columns (clean, meaningful order)
const docSorted=[...layers.document].sort((a,b)=>(parseInt(a.label)||0)-(parseInt(b.label)||0));
docSorted.forEach((n,i)=>{n.slot=i;n.scount=docSorted.length;});
layers.proposition.forEach((n,i)=>{n.slot=i;n.scount=layers.proposition.length;});

/* ---------------------------------------------------------------- build svg */
const gEdge=document.createElementNS(SVGNS,'g');
const gNode=document.createElementNS(SVGNS,'g');
const defs=document.createElementNS(SVGNS,'defs');
defs.innerHTML='<filter id="glow" x="-60%" y="-60%" width="220%" height="220%">'+
  '<feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
svg.append(defs,gEdge,gNode);

const edgeEls=edges.map(e=>{
  const p=document.createElementNS(SVGNS,'path');
  p.setAttribute('class','edge');
  const col=RELCOL[e.rel]||C.line;
  p.setAttribute('stroke',col);
  p.setAttribute('stroke-width',e.kind==='coherence'?(e.hard?2.1:1.4):1);
  if(!e.hard&&e.kind!=='provenance') p.setAttribute('stroke-dasharray','5 5');
  if(e.kind==='provenance'){p.setAttribute('opacity','.32');p.setAttribute('stroke-dasharray','2 4');}
  if(e.own_goal){p.setAttribute('filter','url(#glow)');p.setAttribute('stroke-width','2.6');}
  p.addEventListener('mouseenter',()=>showEdge(e));
  gEdge.appendChild(p); return p;
});

const nodeEls=nodes.map(n=>{
  const g=document.createElementNS(SVGNS,'g');
  g.setAttribute('class','node '+n.layer);
  const c=document.createElementNS(SVGNS,'circle');
  c.setAttribute('r',nodeR(n));
  const col=nodeColor(n);
  if(n.layer==='document'){c.setAttribute('fill','none');c.setAttribute('stroke',col);c.setAttribute('stroke-width','1.6');}
  else{c.setAttribute('fill',col);c.setAttribute('fill-opacity',n.layer==='proposition'?'.92':'.85');
       c.setAttribute('stroke',col);c.setAttribute('stroke-width','1.2');}
  const t=document.createElementNS(SVGNS,'text');
  t.setAttribute('text-anchor','middle');
  t.setAttribute('dy', n.layer==='proposition'?4:(nodeR(n)+12));
  t.textContent=n.label;
  if(n.layer==='claim') t.setAttribute('opacity','0');   // claim labels on hover/select
  if(n.load_bearing){                                    // gold ring = load-bearing / single point of failure
    const ring=document.createElementNS(SVGNS,'circle');
    ring.setAttribute('r',nodeR(n)+3.5);ring.setAttribute('fill','none');
    ring.setAttribute('stroke',C.brass);ring.setAttribute('stroke-width','1.3');ring.setAttribute('opacity','.85');
    g.appendChild(ring);
  }
  g.append(c,t);
  g.addEventListener('mouseenter',()=>hover(n));
  g.addEventListener('mouseleave',()=>{if(!pinned)clearHi();});
  g.addEventListener('pointerdown',ev=>startDrag(ev,n));
  gNode.appendChild(g);
  return {g,c,t,n};
});

/* ---------------------------------------------------------------- simulation */
let alpha=1, running=false;
function step(){
  const k=alpha;
  // repulsion (O(n^2), fine for this size)
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y;let d2=dx*dx+dy*dy||1;
    if(d2>62000)continue; let d=Math.sqrt(d2);const f=2600*k/d2;
    dx/=d;dy/=d;a.vx+=dx*f;a.vy+=dy*f;b.vx-=dx*f;b.vy-=dy*f;
  }
  // springs along edges
  edges.forEach(e=>{
    const a=e.s,b=e.t;let dx=b.x-a.x,dy=b.y-a.y;let d=Math.hypot(dx,dy)||1;
    const L=e.kind==='coherence'?86:120; const f=(d-L)*0.022*k; dx/=d;dy/=d;
    a.vx+=dx*f;a.vy+=dy*f;b.vx-=dx*f;b.vy-=dy*f;
  });
  // column gravity (provenance -> reasoning -> target) + mode forces
  nodes.forEach(n=>{
    let pull = (mode==='pleading'&&n.layer==='claim') ? 0.03 : 0.05;
    n.vx+=(LAYERX[n.layer]*W - n.x)*pull*k;
    if(n.layer==='document'||n.layer==='proposition'){
      const slotY=H*(0.12+0.76*(n.slot+0.5)/n.scount);
      n.vy+=(slotY-n.y)*0.08*k;               // ordered ledger column
    } else {
      n.vy+=(H*0.5-n.y)*0.006*k;
      if(mode==='coherence'&&n.verdict==='rejected') n.vy+=(H*0.95-n.y)*0.013*k; // rejected sink away
    }
  });
  // integrate
  nodes.forEach(n=>{
    if(n===dragging)return;
    n.vx*=0.86;n.vy*=0.86;n.x+=Math.max(-12,Math.min(12,n.vx));n.y+=Math.max(-12,Math.min(12,n.vy));
    n.x=Math.max(40,Math.min(W-40,n.x));n.y=Math.max(34,Math.min(H-80,n.y));
  });
  alpha*=0.985;
}
function curve(e){
  const a=e.s,b=e.t,mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
  const dx=b.x-a.x,dy=b.y-a.y,off=e.kind==='coherence'?14:0;
  const nx=-dy,ny=dx,nl=Math.hypot(nx,ny)||1;
  return `M${a.x.toFixed(1)} ${a.y.toFixed(1)} Q${(mx+nx/nl*off).toFixed(1)} ${(my+ny/nl*off).toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;
}
function render(){
  edgeEls.forEach((p,i)=>p.setAttribute('d',curve(edges[i])));
  nodeEls.forEach(o=>o.g.setAttribute('transform',`translate(${o.n.x.toFixed(1)} ${o.n.y.toFixed(1)})`));
}
function tick(){ step(); render(); if(alpha>0.02){requestAnimationFrame(tick);} else {running=false;} }
function reheat(a=0.7){
  alpha=Math.max(alpha,a);
  if(reduce){ for(let i=0;i<240;i++) step(); render(); return; }
  if(!running){ running=true; requestAnimationFrame(tick); }
}

/* ---------------------------------------------------------------- interaction */
let dragging=null,pinned=null,dragMoved=false;
function startDrag(ev,n){
  ev.preventDefault();dragging=n;dragMoved=false;svg.classList.add('grabbing');
  const move=e=>{const pt=toSvg(e);n.x=pt.x;n.y=pt.y;n.vx=n.vy=0;dragMoved=true;reheat(0.25);};
  const up=e=>{svg.classList.remove('grabbing');window.removeEventListener('pointermove',move);
    window.removeEventListener('pointerup',up);dragging=null;if(!dragMoved){pin(n);}};
  window.addEventListener('pointermove',move);window.addEventListener('pointerup',up);
}
function toSvg(e){const r=svg.getBoundingClientRect();return {x:(e.clientX-r.left),y:(e.clientY-r.top)};}
function hover(n){ if(pinned)return; highlight(n); }
function pin(n){ pinned=n; highlight(n); inspectNode(n); }
function highlight(n){
  const keep=new Set([n.id,...adj[n.id]]);
  nodeEls.forEach(o=>{o.g.classList.toggle('dim',!keep.has(o.n.id));
    if(o.n.layer==='claim')o.t.setAttribute('opacity',keep.has(o.n.id)?'1':'0');});
  edgeEls.forEach((p,i)=>{const e=edges[i];p.classList.toggle('dim',!(e.source===n.id||e.target===n.id));});
}
function clearHi(){nodeEls.forEach(o=>{o.g.classList.remove('dim');if(o.n.layer==='claim')o.t.setAttribute('opacity','0');});
  edgeEls.forEach(p=>p.classList.remove('dim'));}
svg.addEventListener('click',e=>{if(e.target===svg){pinned=null;clearHi();resetInspector();}});

/* ---------------------------------------------------------------- inspector */
const iEye=document.getElementById('iEye'),iTitle=document.getElementById('iTitle'),iBody=document.getElementById('iBody');
function chip(txt,col){return `<span class="chip v" style="border-left-color:${col||C.line}">${esc(txt)}</span>`;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function field(lab,val){return `<div class="field"><div class="lab">${lab}</div><div class="val">${val}</div></div>`;}

function inspectNode(n){
  if(n.layer==='proposition')return inspectProp(n);
  if(n.layer==='document')return inspectDoc(n);
  return inspectClaim(n);
}
function inspectClaim(n){
  iEye.textContent=n.issue+' · claim';
  iTitle.textContent=n.fulltext;
  let h='<div class="chips">';
  h+=chip(n.verdict.toUpperCase(),n.verdict==='accepted'?C.green:C.red);
  h+=chip(n.source_type.replace(/_/g,' '),C.cyan);
  h+=chip('weight '+n.weight,C.brass);
  if(n.polarity==='legal_overlay')h+=chip('legal overlay',C.amber);
  h+='</div>';
  if(n.single_source)h+=`<div class="amend" style="border-color:${C.brass}">⚠ Load-bearing — this pleaded point rests on a single source. Discredit it and the point collapses.</div>`;
  else if(n.load_bearing)h+=field('Role','Load-bearing support — part of what keeps a pleaded point standing.');
  if(n.blocks&&n.blocks.length)h+=field('Sensitivity',`Discredit this and ${n.blocks.map(esc).join(', ')} would revive.`);
  if(n.anchor)h+=field('Source anchor',`<span class="anchor">${esc(n.anchor)}</span>`);
  if(n.quote)h+=field('Verbatim quote',`<div class="quote">${esc(n.quote)}</div>`);
  else if(n.polarity!=='pleading'&&n.source_type!=='absence')
    h+=field('Provenance',`<span class="anchor">${esc(n.anchor||'—')}</span> · quote loads with the bundle`);
  const rels=edges.filter(e=>e.source===n.id||e.target===n.id).filter(e=>e.kind==='coherence');
  if(rels.length){h+='<div class="field"><div class="lab">Coherence relations</div>';
    rels.forEach(e=>{const other=byId[e.source===n.id?e.target:e.source];
      h+=`<div class="rel-item"><div class="r" style="color:${RELCOL[e.rel]||C.ink2}">${e.rel.replace(/_/g,' ')}${e.own_goal?' · OWN GOAL':''} → ${esc(other.label)}</div><div class="e">${esc(e.explanation||'')}</div></div>`;});
    h+='</div>';}
  if(n.prop)h+=field('Pleading target',`<span class="anchor">${esc(n.prop)}</span>`);
  iBody.innerHTML=h;
}
function inspectProp(n){
  iEye.textContent='Pleaded proposition';
  iTitle.textContent=n.label+' — '+n.text;
  let h='<div class="chips">';
  h+=chip(n.verdict,VCOL[n.verdict]); if(n.overlay&&n.overlay!=='NONE')h+=chip('⚖ '+n.overlay,C.amber);
  h+=chip('readiness '+n.readiness+'/100',n.readiness>50?C.green:C.red); h+='</div>';
  const pc=nodes.find(x=>x.prop===n.label&&x.polarity==='pleading');
  if(pc&&pc.single_source)h+=`<div class="amend" style="border-color:${C.brass}">⚠ Load-bearing — this point rests on a single source; if it is discredited it collapses.</div>`;
  const cl=DATA.clusters.find(c=>c.impacts.some(i=>i.startsWith(n.label+':')));
  if(cl){
    const imp=cl.impacts.find(i=>i.startsWith(n.label+':'));
    h+=field('Coherence verdict',esc(imp));
    if(cl.story.length){h+='<div class="field"><div class="lab">Strongest coherent story</div>'+cl.story.map(s=>`<div class="story-li">${esc(s)}</div>`).join('')+'</div>';}
    if(cl.amendments.length){h+='<div class="field"><div class="lab">Suggested amendment</div>'+cl.amendments.map(a=>`<div class="amend">${esc(a)}</div>`).join('')+'</div>';}
  }
  const claims=nodes.filter(x=>x.prop===n.label);
  if(claims.length){h+='<div class="field"><div class="lab">Claims targeting this</div>'+
    claims.map(c=>`<div class="rel-item"><div class="r" style="color:${claimColor(c)}">${esc(c.label)}</div></div>`).join('')+'</div>';}
  iBody.innerHTML=h;
}
function inspectDoc(n){
  iEye.textContent='Provenance · document';
  iTitle.textContent=n.label+' — '+n.title;
  let h='<div class="chips">'+chip(n.doc_type,C.cyan)+chip(n.party,n.party==='claimant'?C.brass:C.gap)+'</div>';
  const asserts=edges.filter(e=>e.source===n.id&&e.kind==='provenance').map(e=>byId[e.target]);
  h+='<div class="field"><div class="lab">Asserts the claims</div>'+
    asserts.map(c=>`<div class="rel-item"><div class="r" style="color:${claimColor(c)}">${esc(c.label)}</div>${c.quote?`<div class="e">“${esc(c.quote.slice(0,120))}${c.quote.length>120?'…':''}”</div>`:''}</div>`).join('')+'</div>';
  iBody.innerHTML=h;
}
function showEdge(e){ if(pinned)return;
  iEye.textContent=(e.kind||'')+' relation';
  iTitle.textContent=`${byId[e.source].label}  ${e.rel.replace(/_/g,' ')}  ${byId[e.target].label}`;
  iBody.innerHTML=(e.explanation?field('Why',esc(e.explanation)):'')+
    (e.own_goal?'<div class="amend" style="border-color:'+C.red+'">Own goal: the claimant\'s own document undermines the claimant\'s pleaded case.</div>':'');
}
function resetInspector(){
  iEye.textContent='Inspector';iTitle.textContent=mode==='pleading'?'Pleading Stress Test':'Bundle Coherence';
  iBody.innerHTML=
    `<div class="pitch">The pleading tells us what matters. The bundle tells us what survives. `+
    `The solver tells us which story is coherent. The lawyer decides what to amend.</div>`+
    `<div class="empty">${mode==='pleading'
      ? 'Each <b>pleaded proposition</b> (right) is tested against the evidence. Hover a node to trace its support and contradiction; click to inspect the verbatim source.'
      : 'A deterministic max-weight solver keeps the <b>strongest set of non-contradictory claims</b>. Rejected pleadings sink away; the surviving coherent story stays lit. Click any claim for its quote, weight and conflicts.'}</div>`+
    `<details class="scale"><summary>How this scales</summary><div class="empty">`+
    `Pleading-centred and issue-local — not one global graph. This demo proves the <b>reasoning layer</b> on a seeded synthetic bundle. At litigation scale: `+
    `(1) the pleadings define the issue map; (2) retrieval / TAR surfaces the high-relevance chunks per issue; `+
    `(3) quote-grounded claims are extracted only from those chunks; (4) coherence is solved <b>locally, per issue</b>, never across the whole case; `+
    `(5) only conflict clusters and pleading impact surface. Cost scales with <b>pleaded issues × top-k evidence</b>, not bundle size. `+
    `It finds the few evidence conflicts that change the case — not every fact.`+
    `</div></details>`;
}

/* ---------------------------------------------------------------- modes */
document.getElementById('modes').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  [...document.querySelectorAll('#modes button')].forEach(x=>x.classList.toggle('on',x===b));
  setMode(b.dataset.mode);
});
function setMode(m){
  mode=m; pinned=null; clearHi();
  document.getElementById('thesisLead').textContent = m==='pleading'
    ? 'The claimant’s own bundle, as a graph — every pleaded allegation traced to the evidence for and against it.'
    : 'The strongest internally consistent story the bundle supports — and the pleadings it forces out.';
  // emphasis: fade the non-focal layer
  nodeEls.forEach(o=>{
    const fade = m==='pleading' ? false
               : (o.n.layer==='claim'&&o.n.verdict==='rejected');
    o.g.classList.toggle('fade',fade);
  });
  edgeEls.forEach((p,i)=>{const e=edges[i];
    // coherence mode foregrounds claim<->claim reasoning; provenance recedes
    p.style.opacity = (m==='coherence' && e.kind==='provenance') ? '.16' : '';
  });
  resetInspector(); reheat(0.85);
}

/* ---------------------------------------------------------------- chrome */
function fillChrome(){
  document.getElementById('caseName').innerHTML=esc(DATA.meta.case).replace('  v  ',' <em>v</em> ');
  document.getElementById('caseSub').textContent=`${DATA.meta.claim_no} · ${DATA.meta.court}`;
  const s=DATA.stats;
  document.getElementById('stats').innerHTML=
    `<div class="stat alert"><b>${s.readiness}/100</b><span>trial-readiness</span></div>`+
    `<div class="stat alert"><b>${s.own_goal}/10</b><span>own-goal</span></div>`+
    `<div class="stat cash"><b>${s.exposure_from}→${s.exposure_to}</b><span>exposure</span></div>`+
    `<div class="stat"><b>${s.claims}</b><span>claims</span></div>`;
  document.getElementById('thesisSeeded').textContent = DATA.meta.seeded
    ? 'Seeded vertical POC · claims from verified gold anchors'
    : 'Claims quote-grounded verbatim from the bundle · verified';
  document.getElementById('legend').innerHTML=[
    leg('dot','#46C68E','supported / accepted'),leg('dot','#E2574A','contradicted / rejected'),
    leg('dot','#E7B45A','legal overlay'),leg('dot','#6A788F','not addressed / absence'),
    '<span class="sep"></span>',
    leg('dot sq','none','document','1.6px solid #7C8AA3'),
    leg('dot','none','load-bearing','1.3px solid #C9A24B'),
    '<span class="sep"></span>',
    legln('#E2574A','contradicts'),legln('#E08A45','supersedes / attacks'),legln('#46C68E','supports'),
    legln('#E7B45A','caps / qualifies'),legln('#3FD3CB','asserts (provenance)'),
  ].join('');
}
function leg(cls,bg,txt,border){return `<span class="leg"><span class="${cls=='dot'?'dot':cls}" style="background:${bg};${border?'border:'+border:''}"></span>${txt}</span>`;}
function legln(col,txt){return `<span class="leg"><span class="ln" style="border-color:${col}"></span>${txt}</span>`;}

/* ---------------------------------------------------------------- boot */
function resize(){W=svg.clientWidth;H=svg.clientHeight;}
window.addEventListener('resize',()=>{resize();reheat(0.3);});
resize();fillChrome();
const im=new URLSearchParams(location.search).get('mode')==='coherence'?'coherence':'pleading';
[...document.querySelectorAll('#modes button')].forEach(x=>x.classList.toggle('on',x.dataset.mode===im));
setMode(im);resetInspector();reheat(1);
const ins=new URLSearchParams(location.search).get('inspect');   // deep-link a node
if(ins&&byId[ins]) pin(byId[ins]);
</script>
</body>
</html>
